<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Griya Surya Indah - Mars Landing Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            /* Menggunakan gambar Dropbox sebagai background */
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://dl.dropboxusercontent.com/scl/fi/dgo0miioxlg9h60q40su3/Desain-tanpa-judul-15.jpg?rlkey=t81acgqy8ae1jhnb1cvu1wmaw&st=gwb7za7p&dl=1');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px 20px;
        }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 420px;
        }

        .art-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin-bottom: 20px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            background: #000;
        }

        .art-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
            transition: transform 0.5s ease;
        }

        .player-controls-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-main {
            font-size: 50px;
            color: white;
            background: rgba(255, 255, 255, 0.2);
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            backdrop-filter: blur(8px);
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s;
            border: 2px solid rgba(255,255,255,0.5);
        }

        .play-main:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.3);
        }

        .seek-container {
            width: 100%;
            margin-bottom: 25px;
            padding: 0 10px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: white;
            border-radius: 10px;
            transition: width 0.1s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 12px;
            color: white; /* Diubah ke putih agar terlihat di background gelap */
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            font-weight: 600;
            margin-top: 8px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            width: 100%;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .service-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            text-decoration: none;
            transition: background 0.2s;
        }

        .service-item:last-child {
            border-bottom: none;
        }

        .service-item:hover {
            background: rgba(0,0,0,0.02);
        }

        .service-icon {
            font-size: 20px;
            width: 24px;
            text-align: center;
        }

        .song-title {
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .artist-name {
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .playing-active .art-image {
            animation: breathe 4s infinite ease-in-out;
            transform: scale(1.05);
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1.05); }
            50% { transform: scale(1.1); }
        }

        .loading-spin {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #errorMessage {
            color: #ff4d4d;
            font-size: 12px;
            margin-top: 10px;
            display: none;
            font-weight: 700;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <!-- Area Gambar -->
        <div class="art-container" id="artWrapper">
            <!--  -->
            <img src="https://storage.googleapis.com/routenote-release-cloudfiles/5063907725372/BLY3tbOsRK_1772098475.jpg" alt="Mars Griya Surya Indah" class="art-image">
            <div class="player-controls-overlay">
                <div class="play-main" id="playBtn">
                    <i id="playIcon" class="fas fa-play" style="margin-left: 5px;"></i>
                </div>
            </div>
        </div>
        
        <!-- Info Lagu -->
        <div class="text-center mb-4">
            <h1 class="text-2xl font-black song-title tracking-tight">Mars Griya Surya Indah</h1>
            <p class="artist-name font-semibold mt-1">Griya Surya Indah</p>
            <div id="errorMessage">Gagal memuat audio. Pastikan koneksi stabil.</div>
        </div>

        <!-- Seek Bar -->
        <div class="seek-container">
            <div class="progress-bar-bg" id="progressBarBg">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-info">
                <span id="currentTime">0:00</span>
                <span id="durationTime">0:00</span>
            </div>
        </div>

        <!-- Daftar Layanan Musik -->
        <div class="glass-card">
            <!-- Spotify -->
            <a href="https://open.spotify.com/intl-id/album/28WiiDPOgm5hFXfqWqTX2v?si=ZtZLQGp3Rg2X8gr_yHVodg" target="_blank" class="service-item">
                <div class="flex items-center gap-4 font-bold text-gray-800">
                    <i class="fab fa-spotify service-icon text-[#1DB954]"></i>
                    <span>Spotify</span>
                </div>
                <div class="bg-[#f3f4f6] text-[#374151] px-4 py-2 rounded-lg text-[10px] font-bold uppercase">Play</div>
            </a>

            <!-- YouTube Music -->
            <a href="https://music.youtube.com/watch?v=mz1pT5ffqrw&si=K-y30IWbPZkAtF5R" target="_blank" class="service-item">
                <div class="flex items-center gap-4 font-bold text-gray-800">
                    <i class="fab fa-youtube service-icon text-[#FF0000]"></i>
                    <span>YouTube Music</span>
                </div>
                <div class="bg-[#f3f4f6] text-[#374151] px-4 py-2 rounded-lg text-[10px] font-bold uppercase">Play</div>
            </a>

            <!-- Apple Music -->
            <a href="https://music.apple.com/us/album/mars-griya-surya-indah-single/1872989002" target="_blank" class="service-item">
                <div class="flex items-center gap-4 font-bold text-gray-800">
                    <i class="fab fa-apple service-icon text-[#FC3C44]"></i>
                    <span>Apple Music</span>
                </div>
                <div class="bg-[#f3f4f6] text-[#374151] px-4 py-2 rounded-lg text-[10px] font-bold uppercase">Play</div>
            </a>

            <!-- Tidal -->
            <a href="https://tidal.com/album/494232577/u" target="_blank" class="service-item">
                <div class="flex items-center gap-4 font-bold text-gray-800">
                    <i class="fas fa-gem service-icon text-[#000000]"></i>
                    <span>Tidal</span>
                </div>
                <div class="bg-[#f3f4f6] text-[#374151] px-4 py-2 rounded-lg text-[10px] font-bold uppercase">Play</div>
            </a>

            <!-- SoundCloud -->
            <a href="https://soundcloud.com/griyasuryaindah/mars-griya-surya-indah-1?utm_source=clipboard&utm_medium=text&utm_campaign=social_sharing" target="_blank" class="service-item">
                <div class="flex items-center gap-4 font-bold text-gray-800">
                    <i class="fab fa-soundcloud service-icon text-[#FF5500]"></i>
                    <span>SoundCloud</span>
                </div>
                <div class="bg-[#f3f4f6] text-[#374151] px-4 py-2 rounded-lg text-[10px] font-bold uppercase">Play</div>
            </a>

            <!-- Amazon Music -->
            <a href="https://music.amazon.com/albums/B0GKHGJQ3M?marketplaceId=ATVPDKIKX0DER&musicTerritory=US&ref=dm_sh_Bnj9AppwkKzgBtCTMl9BGKnqa" target="_blank" class="service-item">
                <div class="flex items-center gap-4 font-bold text-gray-800">
                    <i class="fab fa-amazon service-icon text-[#00A8E1]"></i>
                    <span>Amazon Music</span>
                </div>
                <div class="bg-[#f3f4f6] text-[#374151] px-4 py-2 rounded-lg text-[10px] font-bold uppercase">Play</div>
            </a>

            <!-- Qobuz -->
            <a href="https://www.qobuz.com/br-pt/album/mars-griya-surya-indah-griya-surya-indah/fgun5sh8x51z6" target="_blank" class="service-item">
                <div class="flex items-center gap-4 font-bold text-gray-800">
                    <i class="fas fa-compact-disc service-icon text-[#df2436]"></i>
                    <span>Qobuz</span>
                </div>
                <div class="bg-[#f3f4f6] text-[#374151] px-4 py-2 rounded-lg text-[10px] font-bold uppercase">Play</div>
            </a>
        </div>

        <p class="mt-8 text-white text-[10px] uppercase tracking-widest font-bold opacity-70">© 2026 Griya Surya Indah Records Music</p>
    </div>

    <!-- Pemutar Audio -->
    <audio id="mainAudio" preload="auto">
        <source src="https://dl.dropboxusercontent.com/scl/fi/92lc9nvwt81zo4amsbidp/Mars-Griya-Surya-Indah-Griya-Surya-Indah.mp3?rlkey=9qkz3tlj7sv1eqpqyytkngc9i&st=or8y1khz" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('mainAudio');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const artWrapper = document.getElementById('artWrapper');
        const errorMsg = document.getElementById('errorMessage');
        
        const progressFill = document.getElementById('progressFill');
        const progressBarBg = document.getElementById('progressBarBg');
        const currentTimeEl = document.getElementById('currentTime');
        const durationTimeEl = document.getElementById('durationTime');

        let isPlaying = false;
        let isProcessing = false;

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' + sec : sec}`;
        }

        progressBarBg.addEventListener('click', (e) => {
            if (audio.duration) {
                const rect = progressBarBg.getBoundingClientRect();
                const pos = (e.clientX - rect.left) / rect.width;
                audio.currentTime = pos * audio.duration;
            }
        });

        async function togglePlay() {
            if (isProcessing) return;
            isProcessing = true;
            errorMsg.style.display = 'none';

            try {
                if (isPlaying) {
                    audio.pause();
                } else {
                    playIcon.className = 'fas fa-spinner loading-spin';
                    playIcon.style.marginLeft = '0';
                    await audio.play();
                }
            } catch (err) {
                errorMsg.style.display = 'block';
                updateUI(false);
            } finally {
                isProcessing = false;
            }
        }

        function updateUI(playing) {
            isPlaying = playing;
            if (playing) {
                playIcon.className = 'fas fa-pause';
                playIcon.style.marginLeft = '0';
                artWrapper.classList.add('playing-active');
            } else {
                playIcon.className = 'fas fa-play';
                playIcon.style.marginLeft = '5px';
                artWrapper.classList.remove('playing-active');
            }
        }

        playBtn.addEventListener('click', togglePlay);
        
        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = percent + '%';
                currentTimeEl.innerText = formatTime(audio.currentTime);
            }
        });

        audio.addEventListener('loadedmetadata', () => {
            durationTimeEl.innerText = formatTime(audio.duration);
        });

        audio.addEventListener('play', () => updateUI(true));
        audio.addEventListener('pause', () => updateUI(false));
        audio.addEventListener('ended', () => {
            updateUI(false);
            progressFill.style.width = '0%';
        });

        audio.addEventListener('error', () => {
            errorMsg.style.display = 'block';
            updateUI(false);
            isProcessing = false;
        });

        if (audio.readyState >= 1) {
            durationTimeEl.innerText = formatTime(audio.duration);
        }
    </script>
</body>
</html>
